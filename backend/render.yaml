# Render deployment config for the backend.
# Render auto-detects Dockerfile in backend/.
services:
  - type: web
    name: uaqi-backend
    env: docker
    plan: starter
    healthCheckPath: /api/health
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: uaqi-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: DATA_MODE
        value: mock
      - key: SEED_ON_STARTUP
        value: "false"

databases:
  - name: uaqi-db
    plan: starter
    databaseName: uaqi
    user: uaqi